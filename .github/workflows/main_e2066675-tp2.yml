name: Build and Deploy Vite App to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Vite Production Assets
        run: npm run build

      - name: Zip Dist Folder Contents
        run: |
          cd dist
          zip -r ../site-package.zip .
          cd ..

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "e2066675-tp2"
          publish-profile: secret ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8AB40BBDD593408193365112B21EBE6B }}
          package: ./site-package.zip 
